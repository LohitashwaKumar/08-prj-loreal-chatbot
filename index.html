<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Routine Builder</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <h1 class="site-title">Routine Builder</h1>
      </header>

      <main>
        <section class="top-controls">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="Search products..."
              autocomplete="off"
            />
          </div>

          <div class="filter-box">
            <i class="fa-solid fa-filter"></i>
            <select id="categoryFilter">
              <option value="">All Categories</option>
              <option value="cleanser">Cleansers</option>
              <option value="moisturizer">Moisturizers & Treatments</option>
              <option value="haircare">Haircare</option>
              <option value="makeup">Makeup</option>
              <option value="hair color">Hair Color</option>
              <option value="hair styling">Hair Styling</option>
              <option value="men's grooming">Men's Grooming</option>
              <option value="suncare">Suncare</option>
              <option value="fragrance">Fragrance</option>
            </select>
          </div>
        </section>

        <section>
          <div id="productsContainer" class="products-grid"></div>
        </section>

        <section class="selected-products">
          <div class="selected-header">
            <div>
              <h2>Selected Products</h2>
              <p id="selectedCount">0 products selected</p>
            </div>

            <button id="clearSelections" class="clear-btn" type="button">
              Clear All
            </button>
          </div>

          <div id="selectedProductsEmpty" class="empty-state">
            No products selected yet.
          </div>

          <ul id="selectedProductsList" class="selected-products-list"></ul>

          <button id="generateRoutine" class="generate-btn" type="button">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            Generate Routine
          </button>
        </section>

        <section class="chatbox">
          <div class="chat-header">
            <h2>About Your Routine</h2>
            <p>Get personalized advice and answers about your skincare routine</p>
          </div>

          <div id="latestRoutineStatus" class="routine-status hidden"></div>

          <div id="chatWindow" class="chat-window"></div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask about your routine..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <i class="fa-solid fa-paper-plane"></i>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
